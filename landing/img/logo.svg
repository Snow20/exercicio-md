<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="globeClip">
      <circle cx="100" cy="100" r="85"/>
    </clipPath>
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e88e5"/>
      <stop offset="50%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="globeShadow" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#42a5f5"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </radialGradient>
  </defs>
  
  <style>
    @keyframes spin {
      0% { transform: translateX(0); }
      100% { transform: translateX(-200px); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .continents {
      animation: spin 8s linear infinite;
    }
    .globe {
      animation: pulse 4s ease-in-out infinite;
    }
  </style>
  
  <!-- Globe base (ocean) -->
  <g class="globe">
    <circle cx="100" cy="100" r="85" fill="url(#oceanGrad)"/>
    
    <!-- Continents group with clip -->
    <g clip-path="url(#globeClip)">
      <g class="continents">
        <!-- Europe/Africa -->
        <ellipse cx="120" cy="70" rx="25" ry="35" fill="#4caf50"/>
        <ellipse cx="115" cy="120" rx="20" ry="40" fill="#4caf50"/>
        
        <!-- Americas -->
        <ellipse cx="50" cy="60" rx="18" ry="45" fill="#66bb6a"/>
        <ellipse cx="45" cy="130" rx="15" ry="35" fill="#66bb6a"/>
        
        <!-- Asia -->
        <ellipse cx="170" cy="80" rx="30" ry="25" fill="#81c784"/>
        
        <!-- Australia -->
        <ellipse cx="180" cy="140" rx="15" ry="10" fill="#a5d6a7"/>
        
        <!-- Repeat for seamless loop -->
        <ellipse cx="320" cy="70" rx="25" ry="35" fill="#4caf50"/>
        <ellipse cx="315" cy="120" rx="20" ry="40" fill="#4caf50"/>
        <ellipse cx="250" cy="60" rx="18" ry="45" fill="#66bb6a"/>
        <ellipse cx="245" cy="130" rx="15" ry="35" fill="#66bb6a"/>
      </g>
      
      <!-- Grid lines -->
      <ellipse cx="100" cy="100" rx="85" ry="30" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
      <ellipse cx="100" cy="100" rx="85" ry="55" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
      <ellipse cx="100" cy="100" rx="30" ry="85" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
      <ellipse cx="100" cy="100" rx="55" ry="85" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    </g>
    
    <!-- Shine effect -->
    <circle cx="100" cy="100" r="85" fill="url(#shineGrad)"/>
    
    <!-- Border -->
    <circle cx="100" cy="100" r="85" fill="none" stroke="#0d47a1" stroke-width="3"/>
    
    <!-- Highlight -->
    <ellipse cx="70" cy="65" rx="25" ry="15" fill="#ffffff" opacity="0.2"/>
  </g>
</svg>
